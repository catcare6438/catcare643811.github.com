<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>浪貓不浪 🐾 全資訊管理</title>
    <style>
        :root { --p: #ff8fab; --bg: #fffcfd; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { background: white; border-radius: 15px; padding: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); text-align: center; cursor: pointer; }
        .card img { width: 100%; border-radius: 10px; }
        .card h3 { color: var(--p); margin: 10px 0 5px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; width: 85%; padding: 20px; border-radius: 20px; max-height: 80vh; overflow-y: auto; }
        .info-row { border-bottom: 1px solid #eee; padding: 8px 0; font-size: 0.9rem; }
    </style>
</head>
<body>
    <h2 style="text-align:center; color:var(--p)">🐾 貓咪全資訊檔案</h2>
    <div id="list" class="grid"><div style="grid-column:1/-1; text-align:center">連線雲端中...</div></div>
    
    <div id="modal" class="modal" onclick="this.style.display='none'"><div class="modal-content" onclick="event.stopPropagation()" id="m-body"></div></div>

    <script>
        const URL = "https://script.google.com/macros/s/AKfycbxT_924TOVaiZc7-fEu0gITRgLZNvWmDwJn8xnTg75tcLmPD0eXOanYffdKBYphlvrX/exec";
        let data = [];

        async function init() {
            try {
                const res = await fetch(URL);
                data = await res.json();
                document.getElementById('list').innerHTML = data.map((c, i) => `
                    <div class="card" onclick="show(${i})">
                        <img src="${c.img}">
                        <h3>${c.name}</h3>
                        <small>${c.age}</small>
                    </div>
                `).join('');
            } catch (e) { document.getElementById('list').innerHTML = "讀取失敗"; }
        }

        function show(i) {
            const c = data[i];
            document.getElementById('m-body').innerHTML = `
                <h2 style="color:var(--p); text-align:center">${c.name}</h2>
                <div class="info-row"><b>編號：</b>${c.sn}</div>
                <div class="info-row"><b>花色：</b>${c.color}</div>
                <div class="info-row"><b>疫苗：</b><br>${c.vax.replace(/\n/g, '<br>')}</div>
                <div class="info-row"><b>驅蟲：</b><br>${c.worm.replace(/\n/g, '<br>')}</div>
                <div class="info-row"><b>體重：</b><br>${c.weight.replace(/\n/g, '<br>')}</div>
                <button onclick="document.getElementById('modal').style.display='none'" style="width:100%; margin-top:15px; padding:10px; background:var(--p); color:white; border:none; border-radius:10px;">關閉</button>
            `;
            document.getElementById('modal').style.display = 'flex';
        }
        init();
    </script>
</body>
</html>
